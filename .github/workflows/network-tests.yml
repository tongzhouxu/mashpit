name: network integration tests

# These tests hit live NCBI services (FTP, Entrez) and run a real
# `mashpit build`/`datasets download` genome download, including a full
# ~135-genome taxon build. That makes them slow and dependent on NCBI's
# availability, so they don't run on every push/PR (see python-app.yml);
# instead they run on a schedule and can be triggered manually.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Download and set up ncbi datasets client
        run: |
          curl -o datasets 'https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/v2/linux-amd64/datasets'
          chmod +x datasets
          mkdir -p $HOME/.local/bin
          mv datasets $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install HDF5
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          pip install pytest
      - name: Run full test suite, including live NCBI integration tests
        working-directory: test
        env:
          MASHPIT_RUN_NETWORK_TESTS: "1"
        run: |
          pytest test.py
